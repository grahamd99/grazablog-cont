name: Build and deploy 11ty site to S3 with CloudFront invalidation

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npx eleventy

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::865198111306:role/testblog
          aws-region: eu-west-2

      - name: Deploy to S3
        run: |
          aws s3 sync _site s3://privates3cloudfrontwebsitest-websitebucket75c24d94-lscgymyykqe8 \
            --delete \
            --cache-control "max-age=300"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3BHR03G2O83EZ \
            --paths "/*"
